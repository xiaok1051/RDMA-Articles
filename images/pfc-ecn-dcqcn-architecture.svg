<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="8" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#333"/>
    </marker>
    <marker id="arrow-orange" markerWidth="8" markerHeight="8" refX="8" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#d79b00"/>
    </marker>
  </defs>

  <rect width="100%" height="100%" fill="white"/>

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="#333">PFC / ECN / DCQCN 三件套架构图</text>

  <!-- ===== Row 1: Main boxes ===== -->
  <!-- Sender -->
  <rect x="30" y="60" width="160" height="90" rx="8" fill="#dae8fc" stroke="#6c8ebf" stroke-width="2"/>
  <text x="110" y="82" text-anchor="middle" font-size="14" fill="#333" font-weight="bold">发送端</text>
  <text x="110" y="98" text-anchor="middle" font-size="14" fill="#333">Sender</text>

  <!-- RC QP inside sender -->
  <rect x="45" y="100" width="130" height="35" rx="5" fill="#d5e8d4" stroke="#82b366" stroke-width="1"/>
  <text x="110" y="120" text-anchor="middle" font-size="11" fill="#333">RC QP</text>
  <text x="110" y="133" text-anchor="middle" font-size="11" fill="#333">100Gbps</text>

  <!-- Switch 1 -->
  <rect x="240" y="60" width="140" height="90" rx="8" fill="#e1d5e7" stroke="#9673a6" stroke-width="2"/>
  <text x="310" y="82" text-anchor="middle" font-size="14" fill="#333" font-weight="bold">交换机 1</text>
  <text x="310" y="98" text-anchor="middle" font-size="14" fill="#333">(Leaf)</text>

  <!-- Switch 1 buffer -->
  <rect x="250" y="110" width="120" height="25" fill="#f5f5f5" stroke="#999" stroke-width="1"/>
  <text x="310" y="126" text-anchor="middle" font-size="10" fill="#666">缓冲队列</text>

  <!-- Switch 2 -->
  <rect x="430" y="60" width="140" height="90" rx="8" fill="#e1d5e7" stroke="#9673a6" stroke-width="2"/>
  <text x="500" y="82" text-anchor="middle" font-size="14" fill="#333" font-weight="bold">交换机 2</text>
  <text x="500" y="98" text-anchor="middle" font-size="14" fill="#333">(Spine)</text>

  <!-- Switch 2 buffer (congested) -->
  <rect x="440" y="105" width="120" height="35" fill="#fff2cc" stroke="#d6b656" stroke-width="1"/>
  <rect x="440" y="105" width="75" height="35" fill="#f0d060" opacity="0.5"/>
  <text x="500" y="122" text-anchor="middle" font-size="9" fill="#666">队列 [|||||</text>
  <text x="500" y="135" text-anchor="middle" font-size="9" fill="#c00">↑ 超过 Kmin</text>

  <!-- Receiver -->
  <rect x="630" y="60" width="160" height="90" rx="8" fill="#dae8fc" stroke="#6c8ebf" stroke-width="2"/>
  <text x="710" y="82" text-anchor="middle" font-size="14" fill="#333" font-weight="bold">接收端</text>
  <text x="710" y="98" text-anchor="middle" font-size="14" fill="#333">Receiver</text>

  <!-- Data arrows -->
  <line x1="190" y1="105" x2="230" y2="105" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="380" y1="105" x2="420" y2="105" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="570" y1="105" x2="620" y2="105" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Data flow label -->
  <text x="215" y="50" text-anchor="middle" font-size="10" fill="#666">数据包</text>

  <!-- ===== Row 2: Annotation boxes ===== -->
  <!-- PFC -->
  <rect x="220" y="190" width="180" height="40" rx="6" fill="#f8cecc" stroke="#b85450" stroke-width="1.5"/>
  <text x="310" y="215" text-anchor="middle" font-size="11" fill="#b85450" font-weight="bold">① 队列增长 → PFC PAUSE</text>

  <!-- ECN -->
  <rect x="410" y="190" width="180" height="40" rx="6" fill="#d5e8d4" stroke="#82b366" stroke-width="1.5"/>
  <text x="500" y="215" text-anchor="middle" font-size="11" fill="#2d5a2d" font-weight="bold">② ECN 标记 ECT→CE</text>

  <!-- CNP gen -->
  <rect x="645" y="190" width="130" height="40" rx="6" fill="#ffe6cc" stroke="#d79b00" stroke-width="1.5"/>
  <text x="710" y="215" text-anchor="middle" font-size="11" fill="#b8860b" font-weight="bold">③ 生成 CNP (Op=0x81)</text>

  <!-- ===== CNP return path ===== -->
  <!-- Drop from Receiver right side -->
  <line x1="780" y1="150" x2="780" y2="360" stroke="#d79b00" stroke-width="2" stroke-dasharray="6,3"/>
  <!-- Horizontal return -->
  <line x1="780" y1="360" x2="111" y2="360" stroke="#d79b00" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrow-orange)"/>
  <!-- Up to Sender -->
  <line x1="110" y1="360" x2="110" y2="150" stroke="#d79b00" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrow-orange)"/>

  <!-- CNP label -->
  <text x="450" y="348" text-anchor="middle" font-size="12" fill="#d79b00" font-weight="bold">← CNP 返回 (BECN) →</text>

  <!-- ===== Connecting dashed lines ===== -->
  <!-- CNP gen → CNP path -->
  <line x1="710" y1="230" x2="710" y2="360" stroke="#d79b00" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow-orange)"/>
  <!-- CNP path → DCQCN -->
  <line x1="150" y1="360" x2="150" y2="390" stroke="#d79b00" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow-orange)"/>

  <!-- ===== Row 3: Bottom ===== -->
  <!-- DCQCN -->
  <rect x="20" y="390" width="180" height="45" rx="6" fill="#ffe6cc" stroke="#d79b00" stroke-width="1.5"/>
  <text x="110" y="417" text-anchor="middle" font-size="11" fill="#b8860b" font-weight="bold">④ DCQCN 降速</text>

  <!-- Legend -->
  <rect x="730" y="390" width="150" height="80" rx="6" fill="#f5f5f5" stroke="#ccc" stroke-width="1"/>
  <text x="740" y="408" font-size="11" fill="#333" font-weight="bold">图例</text>
  <line x1="740" y1="418" x2="765" y2="418" stroke="#333" stroke-width="2"/>
  <text x="770" y="422" font-size="10" fill="#666">数据路径</text>
  <line x1="740" y1="438" x2="765" y2="438" stroke="#d79b00" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="770" y="442" font-size="10" fill="#666">控制路径</text>
</svg>