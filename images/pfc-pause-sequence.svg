<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 620" width="960" height="620">
  <defs>
    <marker id="arrow-black" markerWidth="8" markerHeight="8" refX="8" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#333"/>
    </marker>
    <marker id="arrow-orange" markerWidth="8" markerHeight="8" refX="8" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#d79b00"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="8" refX="8" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#82b366"/>
    </marker>
  </defs>

  <rect width="100%" height="100%" fill="white"/>

  <!-- Title -->
  <text x="480" y="32" text-anchor="middle" font-size="18" font-weight="bold" fill="#333">PFC PAUSE 帧交互时序</text>

  <!-- Legend -->
  <rect x="760" y="8" width="190" height="44" rx="4" fill="#f5f5f5" stroke="#ccc" stroke-width="1"/>
  <text x="770" y="24" font-size="10" fill="#333" font-weight="bold">图例</text>
  <line x1="770" y1="38" x2="790" y2="38" stroke="#333" stroke-width="2"/>
  <text x="795" y="42" font-size="9" fill="#666">数据</text>
  <line x1="830" y1="38" x2="850" y2="38" stroke="#d79b00" stroke-width="2" stroke-dasharray="3,2"/>
  <text x="855" y="42" font-size="9" fill="#666">控制</text>
  <line x1="890" y1="38" x2="910" y2="38" stroke="#82b366" stroke-width="2" stroke-dasharray="3,2"/>
  <text x="915" y="42" font-size="9" fill="#666">恢复</text>

  <!-- ===== Entities ===== -->
  <rect x="60" y="70" width="170" height="50" rx="6" fill="#dae8fc" stroke="#6c8ebf" stroke-width="2"/>
  <text x="145" y="93" text-anchor="middle" font-size="14" fill="#333" font-weight="bold">发送端</text>
  <text x="145" y="111" text-anchor="middle" font-size="14" fill="#333">Sender</text>

  <rect x="650" y="70" width="170" height="50" rx="6" fill="#dae8fc" stroke="#6c8ebf" stroke-width="2"/>
  <text x="735" y="93" text-anchor="middle" font-size="14" fill="#333" font-weight="bold">接收端</text>
  <text x="735" y="111" text-anchor="middle" font-size="14" fill="#333">Receiver</text>

  <!-- ===== Lifelines ===== -->
  <line x1="145" y1="120" x2="145" y2="570" stroke="#999" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="735" y1="120" x2="735" y2="570" stroke="#999" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- ====================================================================== -->
  <!-- Step 1: Data transfer (y≈175) -->
  <!-- ====================================================================== -->
  <!-- Arrow -->
  <line x1="145" y1="185" x2="725" y2="185" stroke="#333" stroke-width="2" marker-end="url(#arrow-black)"/>
  <!-- Label above arrow -->
  <rect x="350" y="158" width="160" height="22" rx="4" fill="#dae8fc" stroke="#6c8ebf" stroke-width="1"/>
  <text x="430" y="173" text-anchor="middle" font-size="12" fill="#333" font-weight="bold">① 数据传输</text>
  <!-- Data label -->
  <text x="230" y="178" text-anchor="middle" font-size="10" fill="#666">数据包</text>

  <!-- ====================================================================== -->
  <!-- Step 2: Buffer exceeds X-off (y≈250) -->
  <!-- ====================================================================== -->
  <!-- Buffer at Receiver lifeline -->
  <rect x="740" y="250" width="24" height="45" fill="#fff" stroke="#999" stroke-width="1"/>
  <rect x="740" y="250" width="24" height="32" fill="#f0d060" opacity="0.85"/>
  <text x="752" y="268" text-anchor="middle" font-size="8" fill="#333">buf</text>
  <!-- X-off threshold -->
  <line x1="735" y1="268" x2="772" y2="268" stroke="#c00" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="778" y="271" font-size="8" fill="#c00">X-off</text>
  <!-- Label (right area, well clear of Receiver box) -->
  <rect x="830" y="247" width="120" height="22" rx="4" fill="#f8cecc" stroke="#b85450" stroke-width="1"/>
  <text x="890" y="262" text-anchor="middle" font-size="11" fill="#b85450" font-weight="bold">② 超过 X-off 阈值</text>
  <!-- Leader line -->
  <line x1="830" y1="258" x2="772" y2="268" stroke="#b85450" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- ====================================================================== -->
  <!-- Step 3: PFC PAUSE (y≈340-380) -->
  <!-- ====================================================================== -->
  <!-- Step 3 label (left area, above the arrow) -->
  <rect x="155" y="320" width="155" height="22" rx="4" fill="#ffe6cc" stroke="#d79b00" stroke-width="1"/>
  <text x="232" y="335" text-anchor="middle" font-size="11" fill="#b8860b" font-weight="bold">③ 发送 PFC PAUSE</text>

  <!-- Arrow -->
  <line x1="735" y1="385" x2="155" y2="385" stroke="#d79b00" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrow-orange)"/>

  <!-- PAUSE frame box (centered on arrow) -->
  <rect x="360" y="370" width="140" height="30" rx="3" fill="#ffe6cc" stroke="#d79b00" stroke-width="1.5"/>
  <text x="430" y="386" text-anchor="middle" font-size="10" fill="#b8860b" font-weight="bold">PFC PAUSE 帧</text>
  <text x="430" y="397" text-anchor="middle" font-size="9" fill="#b8860b">Time[3] > 0</text>

  <!-- ====================================================================== -->
  <!-- Step 4: Sender pauses (y≈460) -->
  <!-- ====================================================================== -->
  <!-- Label (left of lifeline) -->
  <rect x="25" y="457" width="115" height="22" rx="4" fill="#f8cecc" stroke="#b85450" stroke-width="1"/>
  <text x="82" y="472" text-anchor="middle" font-size="11" fill="#b85450" font-weight="bold">④ PAUSE 计时器启动</text>
  <!-- Subtitle -->
  <text x="82" y="492" text-anchor="middle" font-size="10" fill="#666">停止发送优先级 3 流量</text>
  <!-- PAUSE indicator (right of lifeline, below label) -->
  <rect x="155" y="463" width="60" height="22" rx="3" fill="#f8cecc" stroke="#b85450" stroke-width="1"/>
  <text x="185" y="478" text-anchor="middle" font-size="10" fill="#b85450" font-weight="bold">PAUSED</text>
  <!-- X mark -->
  <line x1="175" y1="471" x2="190" y2="486" stroke="#c00" stroke-width="2.5"/>
  <line x1="190" y1="471" x2="175" y2="486" stroke="#c00" stroke-width="2.5"/>

  <!-- ====================================================================== -->
  <!-- Step 5: Buffer below X-on (y≈520) -->
  <!-- ====================================================================== -->
  <rect x="740" y="520" width="24" height="35" fill="#fff" stroke="#999" stroke-width="1"/>
  <rect x="740" y="535" width="24" height="12" fill="#d5e8d4" opacity="0.7"/>
  <line x1="735" y1="528" x2="772" y2="528" stroke="#2d5a2d" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="778" y="531" font-size="8" fill="#2d5a2d">X-on</text>

  <rect x="830" y="517" width="120" height="22" rx="4" fill="#d5e8d4" stroke="#82b366" stroke-width="1"/>
  <text x="890" y="532" text-anchor="middle" font-size="11" fill="#2d5a2d" font-weight="bold">⑤ 低于 X-on 阈值</text>
  <line x1="830" y1="528" x2="772" y2="528" stroke="#82b366" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- ====================================================================== -->
  <!-- Bottom arrow: time -->
  <text x="480" y="610" text-anchor="middle" font-size="9" fill="#999">时间 ⏬</text>
</svg>